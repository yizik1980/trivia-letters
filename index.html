<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חידון אותיות בשפת הסימנים הישראלית</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="script.js" defer ></script>
</head>
<body>
<header>
  <h1>🤟 חידון שפת הסימנים הישראלית</h1>
  <p>בחר/י את הסימן הנכון לכל אות בעברית</p>
</header>
<div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
<div class="progress-label" id="progressLabel">שאלה 1 מתוך 22</div>
<div class="score-strip">
  <div class="s-correct">✅ נכון: <span id="scoreCorrect">0</span></div>
  <div class="s-wrong">❌ שגוי: <span id="scoreWrong">0</span></div>
</div>
<div class="question-card" id="questionCard">
  <div class="question-label">מה הסימן של האות?</div>
  <span class="hebrew-letter" id="hebrewLetter">א</span>
  <div class="letter-name" id="letterName">אלף</div>
</div>
<div class="options-grid" id="optionsGrid"></div>
<div class="feedback hidden" id="feedback"></div>
<button class="next-btn" id="nextBtn" onclick="nextQuestion()">הבא ←</button>
<div class="end-screen" id="endScreen">
  <div class="end-title">🎉 סיימת!</div>
  <div class="end-score" id="endScore">0/22</div>
  <div class="end-msg" id="endMsg"></div>
  <button class="restart-btn" onclick="startGame()">שחק שוב 🔄</button>
</div>

</body>
</html>
</body>
</html>
